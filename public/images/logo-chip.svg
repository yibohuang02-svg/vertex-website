<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="innerGrad" cx="30%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#196b36"/>
      <stop offset="100%" stop-color="#0a3d1e"/>
    </radialGradient>
  </defs>

  <!-- Chip outer body (lighter green) -->
  <rect x="72" y="72" width="368" height="368" rx="54" ry="54" fill="#16A34A"/>

  <!-- Chip inner body (darker green) -->
  <rect x="106" y="106" width="300" height="300" rx="38" ry="38" fill="url(#innerGrad)"/>

  <!-- TOP PINS — 7, alternating short/long -->
  <rect x="100" y="48" width="20" height="24" rx="5" fill="#16A34A"/>
  <rect x="149" y="38" width="20" height="34" rx="5" fill="#16A34A"/>
  <rect x="197" y="48" width="20" height="24" rx="5" fill="#16A34A"/>
  <rect x="246" y="38" width="20" height="34" rx="5" fill="#16A34A"/>
  <rect x="294" y="48" width="20" height="24" rx="5" fill="#16A34A"/>
  <rect x="343" y="38" width="20" height="34" rx="5" fill="#16A34A"/>
  <rect x="391" y="48" width="20" height="24" rx="5" fill="#16A34A"/>

  <!-- BOTTOM PINS — 7, alternating short/long -->
  <rect x="100" y="440" width="20" height="24" rx="5" fill="#16A34A"/>
  <rect x="149" y="440" width="20" height="34" rx="5" fill="#16A34A"/>
  <rect x="197" y="440" width="20" height="24" rx="5" fill="#16A34A"/>
  <rect x="246" y="440" width="20" height="34" rx="5" fill="#16A34A"/>
  <rect x="294" y="440" width="20" height="24" rx="5" fill="#16A34A"/>
  <rect x="343" y="440" width="20" height="34" rx="5" fill="#16A34A"/>
  <rect x="391" y="440" width="20" height="24" rx="5" fill="#16A34A"/>

  <!-- LEFT PINS — 6, alternating long/short -->
  <rect x="38" y="107" width="34" height="20" rx="5" fill="#16A34A"/>
  <rect x="48" y="162" width="24" height="20" rx="5" fill="#16A34A"/>
  <rect x="38" y="217" width="34" height="20" rx="5" fill="#16A34A"/>
  <rect x="48" y="272" width="24" height="20" rx="5" fill="#16A34A"/>
  <rect x="38" y="327" width="34" height="20" rx="5" fill="#16A34A"/>
  <rect x="48" y="382" width="24" height="20" rx="5" fill="#16A34A"/>

  <!-- RIGHT PINS — 6, alternating long/short -->
  <rect x="440" y="107" width="34" height="20" rx="5" fill="#16A34A"/>
  <rect x="440" y="162" width="24" height="20" rx="5" fill="#16A34A"/>
  <rect x="440" y="217" width="34" height="20" rx="5" fill="#16A34A"/>
  <rect x="440" y="272" width="24" height="20" rx="5" fill="#16A34A"/>
  <rect x="440" y="327" width="34" height="20" rx="5" fill="#16A34A"/>
  <rect x="440" y="382" width="24" height="20" rx="5" fill="#16A34A"/>

  <!-- Indicator dot (top-left of chip interior) -->
  <circle cx="120" cy="120" r="14" fill="#22C55E"/>

  <!-- V letterform — white, bold, rounded -->
  <path d="M168 155 L256 345 L344 155"
        stroke="white" stroke-width="48"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>
</svg>
